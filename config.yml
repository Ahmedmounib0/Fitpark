backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'en'

collections:
  - name: "settings"
    label: "⚙️ General Settings"
    files:
      - label: "Site Settings"
        name: "settings"
        file: "admin/data/settings.json"
        fields:
          - { label: "Gym Name", name: "gym_name", widget: "string", default: "Fit Park Fouchana" }
          - { label: "Phone", name: "phone", widget: "string", default: "+216 93 000 303" }
          - { label: "Email", name: "email", widget: "string", default: "douissafitness@gmail.com" }
          - { label: "Address", name: "address", widget: "string", default: "Fouchana, Ben Arous, Tunisia" }
          - label: "Opening Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Weekdays (Mon-Sat)", name: "weekdays", widget: "string", default: "7:00 AM – 10:00 PM" }
              - { label: "Sunday", name: "sunday", widget: "string", default: "9:00 AM – 5:00 PM" }

  - name: "pricing"
    label: "💰 Pricing Plans"
    files:
      - label: "Plans"
        name: "plans"
        file: "admin/data/pricing.json"
        fields:
          - label: "Plans"
            name: "plans"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price (TND)", name: "price", widget: "number" }
              - { label: "Featured?", name: "featured", widget: "boolean", default: false }
              - label: "Features"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }

  - name: "coaches"
    label: "👥 Coaches"
    folder: "admin/data/coaches"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Badge", name: "badge", widget: "string" }
      - { label: "Photo URL", name: "photo", widget: "string" }

  - name: "testimonials"
    label: "⭐ Testimonials"
    folder: "admin/data/testimonials"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Label", name: "label", widget: "string" }
      - { label: "Text", name: "text", widget: "text" }
      - { label: "Rating", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
      - { label: "Photo URL", name: "photo", widget: "string" }
